name: explore
description: The Adityas chart explorer.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  arrow_options:
    git:
      url: https://github.com/ninthhousestudios/arjuna
      ref: d70965243de9c14b22bc118adbd86b479497c44c
      path: arrow/options
  arrow_swe:
    git:
      url: https://github.com/ninthhousestudios/arjuna
      ref: d70965243de9c14b22bc118adbd86b479497c44c
      path: arrow/swe
  arrow_core:
    git:
      url: https://github.com/ninthhousestudios/arjuna
      ref: d70965243de9c14b22bc118adbd86b479497c44c
      path: arrow/core
  arrow_calc:
    git:
      url: https://github.com/ninthhousestudios/arjuna
      ref: d70965243de9c14b22bc118adbd86b479497c44c
      path: arrow/calc
  charts_dart:
    git:
      url: https://github.com/ninthhousestudios/charts_dart
  swisseph: ^0.5.1
  web: ^1.1.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.4
  file_picker: ^8.1.6
  flutter_svg: ^2.0.17
  http: ^1.6.0
  supabase_flutter: ^2.15.0
  sentry_flutter: ^9.22.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/beings/
    - assets/images/emblems/
    - assets/images/planets/
    - assets/ephe/
    - assets/glyphs/
    - assets/glyphs/beings/
    - assets/glyphs/planets/
    - assets/text/

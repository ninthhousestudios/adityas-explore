<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g transform="translate(100,100)">
    <!-- leaf outline -->
    <path d="M 0,60 Q -35,20 0,-60 Q 35,20 0,60" fill="#D4A853" fill-opacity="0.15" stroke="#D4A853" stroke-width="4" opacity="0.85"/>
    <!-- stem -->
    <line x1="0" y1="60" x2="0" y2="75" stroke="#D4A853" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
    <!-- vein pattern -->
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#D4A853" stroke-width="2.5" opacity="0.7"/>
    <line x1="0" y1="-10" x2="-18" y2="5" stroke="#D4A853" stroke-width="2.5" opacity="0.7"/>
    <line x1="0" y1="-10" x2="18" y2="5" stroke="#D4A853" stroke-width="2.5" opacity="0.7"/>
    <line x1="0" y1="15" x2="-22" y2="30" stroke="#D4A853" stroke-width="2.5" opacity="0.7"/>
    <line x1="0" y1="15" x2="22" y2="30" stroke="#D4A853" stroke-width="2.5" opacity="0.7"/>
    <!-- center gem -->
    <circle cx="0" cy="-10" r="7" fill="#D4A853" opacity="0.9"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g transform="translate(100,100) rotate(45)">
    <!-- bow arc -->
    <path d="M -50,0 Q 0,-60 50,0" fill="none" stroke="#D4A853" stroke-width="4.5" opacity="0.85"/>
    <!-- bow string -->
    <line x1="-50" y1="0" x2="50" y2="0" stroke="#D4A853" stroke-width="3" opacity="0.7"/>
    <!-- arrow -->
    <line x1="0" y1="-55" x2="0" y2="55" stroke="#D4A853" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
    <!-- arrow head -->
    <polygon points="0,-58 -8,-44 8,-44" fill="#D4A853" opacity="0.9"/>
    <!-- fletching -->
    <line x1="0" y1="55" x2="-10" y2="68" stroke="#D4A853" stroke-width="3" opacity="0.7"/>
    <line x1="0" y1="55" x2="10" y2="68" stroke="#D4A853" stroke-width="3" opacity="0.7"/>
    <!-- center point -->
    <circle cx="0" cy="0" r="6" fill="#D4A853" opacity="0.9"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g transform="translate(100,100)">
    <!-- outer protective circle -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="#D4A853" stroke-width="3.5" opacity="0.85"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#D4A853" stroke-width="2" opacity="0.6"/>
    <!-- three claw marks -->
    <path d="M -25,-35 L -5,0 L -25,35" fill="none" stroke="#D4A853" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <path d="M 0,-40 L 0,0 L 0,40" fill="none" stroke="#D4A853" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <path d="M 25,-35 L 5,0 L 25,35" fill="none" stroke="#D4A853" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <!-- center challenge dot -->
    <circle cx="0" cy="0" r="8" fill="#D4A853" opacity="0.9"/>
  </g>
</svg>
